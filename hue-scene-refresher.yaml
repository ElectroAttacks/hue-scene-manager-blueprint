blueprint:
  name: Hue Scene Refresher (v2.8)
  domain: automation
  author: Electro_Attacks
  description: >
    Intelligently refreshes Philips Hue scenes when lights change state, using advanced state transition detection to minimize unnecessary updates.


    **Core Features:**

    • **Three-State System**: Groups are evaluated as ON (all lights on, no effects), OFF (all lights off), or PARTIAL_ON (mixed states)

    • **Smart Refresh Logic**: State transition awareness determines refresh targets - ON → PARTIAL_ON refreshes all zones, PARTIAL_ON → PARTIAL_ON refreshes only changed zones, direct ON/OFF transitions refresh the room itself

    • **Batch Optimization**: Brightness restoration groups lights by target brightness level, reducing Hue bridge API calls and improving performance

    • **Dynamic Scene Support**: Configurable playback speed for animated Hue scenes with automatic settle delays

    • **Zone Coverage Mapping**: Automatically detects and refreshes overlapping zones within rooms based on light membership

    • **Effect Detection**: Optionally respects or ignores active light effects (colorloop, etc.) when determining group state

    • **Fine-Grained Control**: Exclude specific lights from state evaluation or brightness restoration while still allowing scene participation

    • **Post-Action Hooks**: Execute custom actions when rooms go OFF or after successful scene refresh completion
  homeassistant:
    min_version: 2025.12.4

  input:
    triggers:
      name: Trigger Configuration
      icon: mdi:flash
      description: >
        Defines which events initiate a Hue scene refresh. 
        Triggers must resolve to a Hue light, room, or zone to be considered valid.
      input:
        targets:
          name: Observed Hue Targets
          description: >
            Hue lights, rooms, or zones to observe for state changes.
            Any ON/OFF transition within these targets will trigger the automation.
            The affected Hue room is resolved automatically from the triggering entity.
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

        state_trigger_delay:
          name: Trigger Evaluation Delay
          description: >
            Delay (in seconds) before evaluating the Hue scene state after a trigger.
            This allows the Hue bridge to fully update group states before processing.
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider

        alternative_triggers:
          name: Additional Trigger Sources
          description: >
            Optional additional triggers, such as attribute or service-based changes.
            These triggers must still resolve to a Hue light entity to be processed.
          default: []
          selector:
            trigger:

    scene_options:
      name: Scene Behavior
      icon: mdi:palette
      description: Configuration related to scene activation and animation behavior.
      input:
        transition_time:
          name: Brightness Restore Transition
          description: Transition duration (in seconds) used when restoring brightness for individual lights, rooms, or zones.
          default: 2
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider

        scene_transition_time:
          name: Scene Activation Transition
          description: >
            Transition duration (in seconds) used when activating Hue scenes.
            This value is also used to calculate internal settle delays.
          default: 4
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider
              
        dynamic_scene_speed:
          name: Dynamic Scene Speed Override
          description: >
            Playback speed for dynamic Hue scenes.
            Set to -1 to preserve the scene's original speed.
            Otherwise, the provided value will override the scene default.
            Lower values result in slower animations.
          default: -1
          selector:
            number:
              min: -1
              max: 100
              step: 1
              mode: slider

        targets_with_dynamic_scenes:
          name: Dynamic Scene Targets
          description: >
            Hue rooms or zones that should activate scenes in dynamic mode.
            Only applies when the resolved target matches one of these entries.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

    advanced_options:
      name: Advanced Logic & Safeguards
      icon: mdi:cog
      description: Optional safety rules, exclusions, and corrective behavior.
      collapsed: true
      input:
        ignore_active_effects:
          name: Ignore Active Light Effects
          description: >
            If enabled, a room or zone may be considered fully ON even when one or more lights have active effects (e.g., color loop).
            If disabled, active effects will block scene refreshes.
          default: false
          selector:
            boolean:
        
        turn_off_state_excluded_lights:
          name: Force Off State-Excluded Lights
          description: >
            If enabled, lights excluded from the state check that were OFF at snapshot time will be turned OFF again after scene activation.
            This prevents excluded lights from remaining unintentionally ON.
          default: true
          selector:
            boolean:
            
        targets_excluded_from_state_check:
          name: Exclude Targets from State Evaluation
          description: >
            Hue lights that should be ignored when determining whether a room or zone is considered fully ON.
            These lights will still turn on if included in the Hue scene, but their state will not impact scene refresh logic.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

        targets_excluded_from_brightness_restore:
          name: Exclude Targets from Brightness Restoration
          description: >
            Hue lights, rooms, or zones that should not have their brightness restored after a scene refresh.
            Scene activation will still occur unless otherwise excluded.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

    post_actions:
      name: Optional Post-Actions
      icon: mdi:run
      description: >
        Optional actions executed either when no active room lights are detected or after successful scene activation and brightness restoration.
      collapsed: true
      input:
        turn_off_actions:
          name: Actions When Room Is Effectively OFF
          description: >
            Actions executed when the resolved Hue room contains no active lights at snapshot time. 
            Typical use cases include powering down media devices or triggering fallback automations.
          default: []
          selector:
            action:

        post_activation_actions:
          name: Actions After Scene Refresh
          description: >
            Actions executed after the Hue scene has been refreshed and all brightness restoration logic has completed successfully.
            Useful for notifications, logging, or chaining automations.
          default: []
          selector:
            action:

mode: single
max_exceeded: info

trace:
  stored_traces: 10

triggers:
  - alias: "Hue target turned ON"
    id: state_change
    trigger: light.turned_on
    target: !input targets
    options:
      behavior: any

  - alias: "Hue target turned OFF"
    id: state_change
    trigger: light.turned_off
    target: !input targets
    options:
      behavior: any

  - triggers: !input alternative_triggers

variables:
  state_trigger_delay: !input state_trigger_delay
  brightness_transition_time: !input transition_time
  scene_transition_time: !input scene_transition_time
  dynamic_scene_speed: !input dynamic_scene_speed
  dynamic_scene_targets: !input targets_with_dynamic_scenes
  state_check_exclusions: !input targets_excluded_from_state_check
  allow_active_effects: !input ignore_active_effects
  turn_off_state_excluded_lights: !input turn_off_state_excluded_lights
  brightness_restore_exclusions: !input targets_excluded_from_brightness_restore
  resolved_targets: >
    {# ===================================================================
      Target Resolution Engine
      
      Converts Home Assistant target selectors into flat, deduplicated lists
      of light entity IDs by recursively resolving all hierarchical references.
      
      Purpose:
        User configurations can specify targets using various selector types:
        • Direct entity IDs (light.bedroom_1)
        • Devices (all entities on a Hue bridge/device)
        • Areas/Rooms (all entities in a specific area)
        • Floors (all entities on a building level)
        • Labels/Tags (all entities with a specific label)
        
        This engine resolves ALL of these into a single deduplicated list
        of actual light entity IDs for efficient runtime processing.
      
      Processing Flow:
        1. Extract direct entity_id references
        2. Expand hierarchical targets:
           • Floors → entities on that floor
           • Areas → entities in that area  
           • Devices → entities on that device
        3. Process labels (which can tag entities, devices, OR areas):
           • Direct: Entities with the label
           • Indirect: Devices/Areas with label → their entities
        4. Merge all sources
        5. Filter to 'light' domain only
        6. Deduplicate and return as list
      
      Input Format (source):
        Target selector object with any combination of:
        • entity_id: string | list[string]
        • device_id: string | list[string]
        • area_id: string | list[string]  
        • floor_id: string | list[string]
        • label_id: string | list[string]
      
      Output Format:
        List[string] - Unique light entity IDs
        Example: ['light.bedroom_1', 'light.living_room_2', ...]
      
      Used For:
        • dynamic: Lights that should use dynamic scene playback
        • state_excluded: Lights excluded from group state evaluation
        • brightness_excluded: Lights excluded from brightness restoration
    =================================================================== #}
    
    {%- macro resolve_targets(source, returns) -%}

      {%- set entities = source.entity_id 
        if source.entity_id is list
        else ([source.entity_id] 
          if source.entity_id is defined 
          else [])
      -%}

      {%- set floors = (source.floor_id | map('floor_entities') | list | sum(start=[]))
        if source.floor_id is list 
        else (floor_entities(source.floor_id) 
          if source.floor_id is defined 
          else [])
      -%}

      {%- set areas = (source.area_id | map('area_entities') | list | sum(start=[]))
        if source.area_id is list 
        else (area_entities(source.area_id) 
          if source.area_id is defined 
          else [])
      -%}

      {%- set devices = (source.device_id | map('device_entities') | list | sum(start=[]))
        if source.device_id is list 
        else (device_entities(source.device_id) 
          if source.device_id is defined 
          else [])
      -%}

      {%- set labels = namespace(entities=[]) -%}

      {%- if source.label_id is defined -%}
        {# Normalize to list #}
        {%- set label_ids = source.label_id 
          if source.label_id is list
          else [source.label_id]
        -%}

        {%- for label in label_ids %}
          {# 1. Directly labeled entities #}
          {%- set labels.entities = labels.entities + (label_entities(label) or []) -%}

          {# 2. Devices with label → their entities #}
          {%- set labeled_devices = label_devices(label) or [] -%}
          {%- set labels.entities = labels.entities + (labeled_devices | map('device_entities') | list | sum(start=[])) -%}

          {# 3. Areas with label → their entities #}
          {%- set labeled_areas = label_areas(label) or [] -%}
          {%- set labels.entities = labels.entities + (labeled_areas | map('area_entities') | list | sum(start=[])) -%}
        {%- endfor -%}
      {%- endif -%}

      {%- do returns(
        (entities + floors + areas + devices + labels.entities)
          | select('match', '^light\.')
          | unique
          | list
      ) -%}

    {%- endmacro -%}

    {% set fn = resolve_targets | as_function %}
    {{
      {
        'dynamic': fn(dynamic_scene_targets),
        'state_excluded': fn(state_check_exclusions),
        'brightness_excluded': fn(brightness_restore_exclusions)
      }
    }}
    
conditions:
  - alias: "Allow execution for valid Hue-origin triggers"
    condition: or
    conditions:
      - alias: "Primary Hue state trigger (not state-excluded)"
        condition: and
        conditions:
          - alias: "Triggered by Hue ON/OFF state change"
            condition: trigger
            id: state_change
            
          - alias: "Trigger entity is not excluded from state evaluation"
            condition: template
            value_template: "{{ trigger.entity_id not in resolved_targets.state_excluded }}"
            
      - alias: "External trigger resolved to Hue light entity"
        condition: and
        conditions:
          - alias: "Trigger did not originate from Hue state change"
            condition: not
            conditions:
              - alias: "Check for state_change trigger"
                condition: trigger
                id: state_change

          - alias: "Trigger entity_id is present and valid"
            condition: template
            value_template: "{{ trigger.entity_id is string }}"

          - alias: "Trigger entity belongs to light domain"
            condition: template
            value_template: "{{ trigger.entity_id.split('.')[0] == 'light' }}"

          - alias: "Trigger entity belongs to Philips Hue integration"
            condition: template
            value_template: >
              {% set ids = device_attr(trigger.entity_id, 'identifiers') or [] %}
              {{ ids | selectattr(0, 'eq', 'hue') | list | count > 0 }}
 
actions:
  - alias: "Store all Hue entities for snapshot"
    variables:
      all_hue_entities: >
        {{ 
          integration_entities('hue')
          | reject('match', '^(binary_sensor|sensor|switch|event)\.')
          | list
        }}

  - alias: "Initialize state change tracking"
    variables:
      trigger_events: >
        {{ {
          trigger.entity_id: {
            'from_state': trigger.from_state.state if trigger.from_state is not none else 'unknown',
            'to_state': trigger.to_state.state if trigger.to_state is not none else 'unknown'
          }
        } }}

  - alias: "Collect subsequent state changes via polling"
    repeat:
      until:
        - alias: "No new events detected"
          condition: template
          value_template: "{{ previous_event_count >= trigger_events | count }}"

      sequence:
        - alias: "Store event count before polling"
          variables:
            previous_event_count: "{{ trigger_events | count }}"

        - alias: "Poll for recently changed Hue lights"
          variables:
            trigger_events: |
              {% set recently_changed_lights =
                all_hue_entities
                | select('match', '^light\.')
                | expand
                | rejectattr('state', 'in', ['unknown', 'unavailable'])
                | selectattr('last_changed', '>=', utcnow() - timedelta(seconds=state_trigger_delay))
                | list
              %}

              {% set events = namespace(data=trigger_events) %}
              {% for light in recently_changed_lights %}
                {% set events.data = events.data | combine({
                  light.entity_id: {
                    'from_state': 'on' if light.state == 'off' else 'off',
                    'to_state': light.state
                  }
                }) %}
              {% endfor %}

              {{ events.data }}
          
        - alias: "Delay before next poll"
          delay: "{{ [ state_trigger_delay, 0.25 ] | max }}"

  - alias: "Finalize state change tracking"
    variables:
      previous_event_count: null

  - alias: "Capture Hue state snapshot"
    variables:
      hue_snapshot: >
        {# ===================================================================
          Extract entity IDs from trigger events for efficient lookups
          
          Creates a flat list of entity_ids that were part of state changes
          Used by build_base_entry macro to mark entities as changed
        =================================================================== #}
        {% set trigger_event_ids = trigger_events.keys() | list %}

        {# ===================================================================
          Macro: Build base entry for any Hue entity
          
          Creates a standardized entry structure for rooms, zones, or lights
          with common properties like state, brightness, and change tracking.
          
          For lights (non-groups), also includes effect detection.
        =================================================================== #}
        {% macro build_base_entry(entity_state, returns) %}
          {% set base_entry = {
            'state': entity_state.state,
            'has_changed': entity_state.entity_id in trigger_event_ids,
            'state_excluded': entity_state.entity_id in resolved_targets.state_excluded
          } %}

          {# Add brightness data for entities that are ON #}
          {% if entity_state.state == 'on' %}
            {% set base_entry = base_entry | combine({
              'brightness': int(entity_state.attributes['brightness'], 0)
            }) %}

            {# Only individual lights (not groups) have effect attributes #}
            {% if entity_state.attributes['hue_type'] is not defined %}
              {% set base_entry = base_entry | combine({
                'has_effect': entity_state.attributes['effect'] not in [null, none, 'off'] and not allow_active_effects,
              }) %}
            {% endif %}
          {% endif %}

          {% do returns(base_entry) %}
        {% endmacro %}

        {# ===================================================================
          Step 1: Collect and categorize all Hue entities
          
          Filters out non-light domains and unavailable entities, then
          separates into scenes, groups (rooms/zones), and individual lights
        =================================================================== #}
        {% set all_hue_entities = 
          all_hue_entities
          | expand 
          | rejectattr('state', 'in', ['unavailable', 'unknown'])
          | sort(attribute='state', reverse=true)
          | list
        %}

        {# Separate scenes for last-activated scene detection #}
        {% set hue_scenes = 
          all_hue_entities
          | selectattr('domain', 'eq', 'scene')
          | list
        %}

        {# Groups include both rooms and zones (sorted with rooms first) #}
        {% set hue_groups = 
          all_hue_entities
          | selectattr('domain', 'eq', 'light')
          | selectattr('attributes.is_hue_group', 'eq', true)
          | sort(attribute='attributes.hue_type', reverse=true)
          | list
        %}

        {# Individual lights (not groups) #}
        {% set hue_lights = 
          all_hue_entities
          | selectattr('domain', 'eq', 'light')
          | reject('in', hue_groups)
          | list
        %}

        {# ===================================================================
          Step 2: Build state snapshot for all rooms and zones
          
          Iterates through each group (room/zone) and captures:
          - Group state and brightness
          - Last activated scene (if group is ON)
          - Individual light states and brightness (as dict)
          - Zone-to-room mappings with coverage percentage
          
          Structure:
            snapshot.rooms = {room_id: {state, lights: {light_id: data}, zones: {zone_id: data}}}
            snapshot.zones = {zone_id: {state, lights: {light_id: data}, coverage}}
          
          Uses dictionaries throughout for O(1) lookups and efficient merging
        =================================================================== #}
        {% set snapshot = namespace(rooms={}, zones={}, zones_in_rooms={}) %}
        {% set build_base_entry = build_base_entry | as_function %}

        {% for group in hue_groups %}
          {# Initialize group entry with base properties #}
          {% set group_entry = build_base_entry(group) %}

          {# ---------------------------------------------------------------
            Add scene data for active groups
          --------------------------------------------------------------- #}
          {% if group.state == 'on' %}
            {# Find the last activated scene for this group #}
            {% set active_scene = 
              hue_scenes
              | selectattr(
                  'entity_id',
                  'in',
                  device_entities(device_id(group.entity_id))
                )
              | first
            %}

            {% if active_scene is not none %}
              {% set group_entry = group_entry | combine({
                'scene': {
                  'entity_id': active_scene.entity_id,
                  'last_activated': active_scene.state,
                  'dynamics_speed': int(active_scene.attributes.speed * 100, 0),
                  'supports_dynamic': bool(active_scene.attributes.is_dynamic, false),
                }
              }) %}
            {% endif %}
          {% endif %}

          {# ---------------------------------------------------------------
            Build light list with individual light states
          --------------------------------------------------------------- #}
          
          {% set group_lights = namespace(items = { }) %}  

          {% for light in hue_lights 
            | selectattr('entity_id', 'in', group.attributes['entity_id'])
            | list
          %}
            {% set group_lights.items = group_lights.items | combine({
              light.entity_id: build_base_entry(light)
            }) %}
          {% endfor %}
          
          {# ---------------------------------------------------------------
            Calculate effective group state
            
            A group can be in one of three states:
            - ON: All non-excluded lights are ON and effect-free
            - OFF: All non-excluded lights are OFF
            - PARTIAL_ON: Some lights are ON, some OFF, or effects active
          --------------------------------------------------------------- #}
          {% set evaluated_lights = 
            group_lights.items.values()
            | selectattr('state_excluded', 'eq', false)
            | list
          %}
          
          {% set total_evaluated = evaluated_lights | count %}
          {% set lights_on = evaluated_lights | selectattr('state', 'eq', 'on') | list | count %}
          {% set lights_effect_free = evaluated_lights | selectattr('has_effect', 'eq', false) | list | count %}

          {# Determine group state based on light conditions #}
          {% set group_fully_active = total_evaluated > 0 and total_evaluated == lights_on and lights_on == lights_effect_free %}
          {% set group_fully_off = lights_on == 0 %}

          {# Update entry with calculated state #}
          {% set group_entry = group_entry | combine({
            'state': 'on' if group_fully_active else 'off' if group_fully_off else 'partial_on',
          }) %}

          {# ---------------------------------------------------------------
            Optimize change detection
            
            If group entity itself changed (was directly triggered), has_changed
            is already true from macro. Otherwise, check if any nested light
            changed. This avoids expensive iteration when group was triggered.
          --------------------------------------------------------------- #}
          {% if not group_entry.has_changed %}
            {% set group_entry = group_entry | combine({
              'has_changed':
                group_lights.items.values()
                | selectattr('has_changed', 'eq', true)
                | list 
                | count > 0 
            }) %}
          {% endif %}

          {# ---------------------------------------------------------------
            Categorize as room or zone, and map zone coverage
          --------------------------------------------------------------- #}
          {% if group.attributes['hue_type'] == 'room' %}
            {# For rooms: find overlapping zones and calculate coverage #}
            {% set overlapping_zones = namespace(items={}) %}

            {% for zone_id, zone in snapshot.zones.items() %}
              {# Count how many zone lights are in this room #}
              {% set overlap_count = 
                zone.lights.keys()
                | select('in', group_lights.items.keys())
                | list
                | count
              %}
              
              {% if overlap_count > 0 %}
                {# Mark this zone as assigned to avoid duplication in output #}
                {% set snapshot.zones_in_rooms = snapshot.zones_in_rooms | combine({zone_id: true}) %}
                
                {# Calculate coverage percentage (zone lights / room lights) #}
                {% set zone = zone | combine({
                  'coverage': (overlap_count / group_lights.items | count * 100) | round(2)
                }) %}

                {% set overlapping_zones.items = overlapping_zones.items | combine({zone_id: zone}) %}
              {% endif %}
            {% endfor %}

            {# Attach zones and lights to room entry #}
            {% set group_entry = group_entry | combine({
              'zones': overlapping_zones.items,
              'lights': group_lights.items
            }) %}
          
            {% set snapshot.rooms = snapshot.rooms | combine({
              group.entity_id: group_entry
            }) %}

          {% elif group.attributes['hue_type'] == 'zone' %}
            {# For zones: initialize with 0% coverage (updated when assigned to room) #}
            {% set group_entry = group_entry | combine({
              'coverage': 0,
              'lights': group_lights.items
            }) %}
          
            {% set snapshot.zones = snapshot.zones | combine({
              group.entity_id: group_entry
            }) %}
          {% endif %}
        {% endfor %}

        {# ===================================================================
          Step 3: Output final snapshot
          
          Returns only unassigned zones (those not mapped to any room)
          alongside all rooms with their embedded zone references
        =================================================================== #} 
        {% set standalone_zones = namespace(data={}) %}
        {% for zone_id, zone in snapshot.zones.items() if zone_id not in snapshot.zones_in_rooms %}
          {% set standalone_zones.data = standalone_zones.data | combine({
            zone_id: zone
          }) %}
        {% endfor %}

        {{ {
          'metadata': {
            'version': '2.8',
            'timestamp': utcnow().isoformat(),
          },
          'rooms': snapshot.rooms,
          'zones': standalone_zones.data
        } }}

  - alias: "Determine affected groups requiring scene refresh"
    variables:
      affected: >
        {# ===================================================================
          Analyze state transitions to determine refresh targets
          
          Logic:
          - Room ON → PARTIAL_ON: Refresh all zones in that room
          - Room PARTIAL_ON → PARTIAL_ON: Refresh only zones that changed
          - Room → OFF or ON: Refresh the room itself
          
          Structure:
            affected.rooms = {room_id: room_data} - Rooms requiring direct refresh
            affected.zones = {zone_id: zone_data} - Zones requiring refresh
          
          Note: Partial_on state means mixed light states (some on, some off)
          All operations use dictionary combine for efficient deduplication
        =================================================================== #}
        {% set affected = namespace(rooms={}, zones={}) %}

        {# ===================================================================
          Process rooms with state changes
        =================================================================== #}
        {% for room_id, room in hue_snapshot.rooms.items() if room.has_changed %}
          
          {# ---------------------------------------------------------------
            Determine if room transitioned from ON to PARTIAL_ON
            
            Reconstruct previous state by reversing changed lights:
            - Changed lights now OFF were previously ON
            - Changed lights now ON were previously OFF
            - Unchanged lights had the same state before
            
            If reversing changes results in all lights ON, then ON → PARTIAL_ON
          --------------------------------------------------------------- #}
          {% set evaluated_lights = room.lights.values() | selectattr('state_excluded', 'eq', false) | list %}
          {% set changed_lights = evaluated_lights | selectattr('has_changed', 'eq', true) | list %}
          
          {# Count lights that would have been ON before the change #}
          {% set lights_on_before = namespace(count=0) %}
          {% for light in evaluated_lights %}
            {% if light.has_changed %}
              {# Reverse the change: if OFF now, was ON before #}
              {% if light.state == 'off' %}
                {% set lights_on_before.count = lights_on_before.count + 1 %}
              {% endif %}
            {% else %}
              {# Unchanged: use current state #}
              {% if light.state == 'on' and not light.get('has_effect', false) %}
                {% set lights_on_before.count = lights_on_before.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          
          {% set room_was_on = room.state == 'partial_on' and lights_on_before.count == evaluated_lights | count %}

          {# ---------------------------------------------------------------
            Apply refresh logic based on state transition
          --------------------------------------------------------------- #}
          {% if room.state == 'partial_on' %}
            
            {% if room_was_on %}
              {# ON → PARTIAL_ON: Refresh all zones #}
              {% for zone_id, zone in room.zones.items() %}
                {% set affected.zones = affected.zones | combine({zone_id: zone}) %}
              {% endfor %}
              
            {% else %}
              {# PARTIAL_ON → PARTIAL_ON: Refresh only changed zones #}
              {% for zone_id, zone in room.zones.items() if zone.has_changed %}
                {% set affected.zones = affected.zones | combine({zone_id: zone}) %}
              {% endfor %}
            {% endif %}
            
          {% else %}
            {# Room is ON or OFF: Refresh the room itself #}
            {% set affected.rooms = affected.rooms | combine({room_id: room}) %}
          {% endif %}

        {% endfor %}

        {# ===================================================================
          Process unassigned zones with state changes
          
          Only zones not mapped to any room are processed here
        =================================================================== #}
        {% for zone_id, zone in hue_snapshot.zones.items() if zone.has_changed %}
          {% set affected.zones = affected.zones | combine({zone_id: zone}) %}
        {% endfor %}

        {# ===================================================================
          Output affected groups for scene refresh
        =================================================================== #}
        {{ {
          'rooms': affected.rooms,
          'zones': affected.zones
        } }}

  - alias: "Process and refresh each affected room and zone"
    repeat:
      for_each: >
        {# Combine rooms and zones into single list for processing #}
        {{ affected.rooms.items() | list + affected.zones.items() | list }}
      
      sequence:
        - alias: "Route processing based on group state"
          choose:
          - conditions:
            - alias: "Group is currently ON"
              condition: template
              value_template: "{{ repeat.item[1].state == 'on' }}"

            sequence:
              - alias: "Check if group has an active scene"
                choose:
                  - conditions:
                    - alias: "Group has an active scene"
                      condition: template
                      value_template: "{{ repeat.item[1].scene is defined }}"
                
                    sequence:
                      - alias: "Prepare scene activation data"
                        variables:
                          scene_data: >
                            {# ===================================================================
                              Build scene activation parameters
                              
                              Includes: transition time, dynamic settings (if supported),
                              and brightness (if not excluded)
                            =================================================================== #}
                            {% set data = {
                              'transition': scene_transition_time
                            } %}

                            {# Add dynamic scene settings if scene supports it #}
                            {% if repeat.item[1].scene.supports_dynamic %}
                              {% set data = data | combine({
                                'dynamic': repeat.item[0] in resolved_targets.dynamic,
                                'speed': dynamic_scene_speed if dynamic_scene_speed != -1 else repeat.item[1].scene.dynamics_speed
                              }) %}
                            {% endif %}

                            {# Add brightness if not excluded from restoration #}
                            {% if repeat.item[0] not in resolved_targets.brightness_excluded %}
                              {% set data = data | combine({
                                'brightness': repeat.item[1].brightness
                              }) %}
                            {% endif %}

                            {{ data }}
                        
                      - alias: "Activate Hue scene"
                        action: hue.activate_scene
                        continue_on_error: true
                        data: "{{ scene_data }}"
                        target:
                          entity_id: "{{ repeat.item[1].scene.entity_id }}"

                default:
                  - alias: "Log skipped refresh (no scene found)"
                    continue_on_error: true
                    data:
                      name: "Hue Scene Refresher"
                      message: >
                        "Skipped scene refresh for {{ repeat.item[0] }}: No active scene detected."
                    service: logbook.log
                    
              - alias: "Handle state-excluded lights"
                choose:
                  - conditions:
                    - alias: "Feature is enabled"
                      condition: template
                      value_template: "{{ turn_off_state_excluded_lights }}"

                    - alias: "Group contains state-excluded lights"
                      condition: template
                      value_template: "{{ repeat.item[1].lights.values() | selectattr('state_excluded', 'eq', true) | list | count > 0 }}"
                
                    sequence:
                      - alias: "Turn off state-excluded lights"
                        action: light.turn_off
                        data:
                          transition: "{{ brightness_transition_time }}"
                        target:
                          entity_id: >
                            {{ 
                              repeat.item[1].lights.items()
                              | selectattr('[1].state_excluded', 'eq', true) 
                              | map(attribute='[0]') 
                              | list 
                            }}

                default: []

              - alias: "Group lights by brightness level"
                variables:
                  brightness_batches: >
                    {# ===================================================================
                      Batch lights by brightness for efficient restoration
                      
                      Groups lights with the same brightness together to minimize
                      service calls and improve performance
                    =================================================================== #}
                    {% set ns = namespace(groups={}) %}

                    {% for light_id, light in repeat.item[1].lights.items()
                        if light.state == 'on'
                        and light.brightness | int(0) > 0
                        and light_id not in resolved_targets.brightness_excluded
                    %}
                      {% set key = light.brightness | string %}

                      {% set ns.groups = ns.groups | combine({
                        key: (ns.groups[key] if key in ns.groups else []) + [light_id]
                      }) %}
                    {% endfor %}

                    {{ ns.groups }}

              - alias: "Restore brightness if batches exist"
                choose:
                - conditions:
                  - alias: "Brightness batches were created"
                    condition: template
                    value_template: "{{ brightness_batches | count > 0 }}"

                  sequence:
                    - alias: "Restore brightness for each batch"
                      repeat:
                        for_each: >
                          {# Process each brightness group as [brightness_value, [entity_ids]] #}
                          {{ 
                            brightness_batches.items() 
                            | list 
                          }}

                        sequence:
                          - alias: "Apply brightness to light batch"
                            action: light.turn_on
                            continue_on_error: true
                            data:
                              brightness: "{{ repeat.item[0] | int }}"
                              transition: "{{ brightness_transition_time }}"
                            target:
                              entity_id: "{{ repeat.item[1] }}"
                
                default: []
                  
              - alias: "Execute post-activation actions"
                choose: []
                default: !input post_activation_actions            

          default:
            - alias: "Execute turn-off actions for effectively OFF group"
              choose: []
              default: !input turn_off_actions
        