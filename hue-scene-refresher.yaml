blueprint:
  name: Hue Scene Refresher
  domain: automation
  author: Electro_Attacks
  description: >
    Refreshes the last active Philips Hue scene for the affected room and any overlapping zones when a Hue light, room, or zone changes state.
    The automation safely evaluates the current area state, restores brightness where appropriate, supports dynamic scenes, respects active effects, and allows fine-grained exclusions and alternative trigger sources.
  homeassistant:
    min_version: 2025.12.4

  input:
    triggers:
      name: Trigger Configuration
      icon: mdi:flash
      description: >
        Defines which events initiate a Hue scene refresh. 
        Triggers must resolve to a Hue light, room, or zone to be considered valid.
      input:
        targets:
          name: Observed Hue Targets
          description: >
            Hue lights, rooms, or zones to observe for state changes.
            Any ON/OFF transition within these targets will trigger the automation.
            The affected Hue room is resolved automatically from the triggering entity.
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

        state_trigger_delay:
          name: Trigger Evaluation Delay
          description: >
            Delay (in seconds) before evaluating the Hue scene state after a trigger.
            This allows the Hue bridge to fully update group states before processing.
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider

        alternative_triggers:
          name: Additional Trigger Sources
          description: >
            Optional additional triggers, such as attribute or service-based changes.
            These triggers must still resolve to a Hue light entity to be processed.
          default: []
          selector:
            trigger:

    scene_options:
      name: Scene Behavior
      icon: mdi:palette
      description: Configuration related to scene activation and animation behavior.
      input:
        transition_time:
          name: Brightness Restore Transition
          description: Transition duration (in seconds) used when restoring brightness for individual lights, rooms, or zones.
          default: 2
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider

        scene_transition_time:
          name: Scene Activation Transition
          description: >
            Transition duration (in seconds) used when activating Hue scenes.
            This value is also used to calculate internal settle delays.
          default: 4
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: sec
              mode: slider
              
        dynamic_scene_speed:
          name: Dynamic Scene Speed Override
          description: >
            Playback speed for dynamic Hue scenes.
            Set to -1 to preserve the scene's original speed.
            Otherwise, the provided value will override the scene default.
            Lower values result in slower animations.
          default: -1
          selector:
            number:
              min: -1
              max: 100
              step: 1
              mode: slider

        targets_with_dynamic_scenes:
          name: Dynamic Scene Targets
          description: >
            Hue rooms or zones that should activate scenes in dynamic mode.
            Only applies when the resolved target matches one of these entries.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

    advanced_options:
      name: Advanced Logic & Safeguards
      icon: mdi:cog
      description: Optional safety rules, exclusions, and corrective behavior.
      collapsed: true
      input:
        ignore_active_effects:
          name: Ignore Active Light Effects
          description: >
            If enabled, a room or zone may be considered fully ON even when one or more lights have active effects (e.g., color loop).
            If disabled, active effects will block scene refreshes.
          default: false
          selector:
            boolean:
        
        turn_off_state_excluded_lights:
          name: Force Off State-Excluded Lights
          description: >
            If enabled, lights excluded from the state check that were OFF at snapshot time will be turned OFF again after scene activation.
            This prevents excluded lights from remaining unintentionally ON.
          default: true
          selector:
            boolean:
            
        targets_excluded_from_state_check:
          name: Exclude Targets from State Evaluation
          description: >
            Hue lights that should be ignored when determining whether a room or zone is considered fully ON.
            These lights will still turn on if included in the Hue scene, but their state will not impact scene refresh logic.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

        targets_excluded_from_brightness_restore:
          name: Exclude Targets from Brightness Restoration
          description: >
            Hue lights, rooms, or zones that should not have their brightness restored after a scene refresh.
            Scene activation will still occur unless otherwise excluded.
          default: []
          selector:
            target:
              device:
                integration: hue
              entity:
                domain: light

mode: restart
max_exceeded: info

triggers:
  - alias: Detect any light in target group turning ON
    id: state_change
    trigger: light.turned_on
    target: !input targets
    options:
      behavior: any

  - alias: Detect any light in target group turning OFF
    id: state_change
    trigger: light.turned_off
    target: !input targets
    options:
      behavior: any

  - triggers: !input alternative_triggers

variables:
  brightness_transition_time: !input transition_time
  scene_transition_time: !input scene_transition_time
  dynamic_scene_speed: !input dynamic_scene_speed
  dynamic_scene_targets: !input targets_with_dynamic_scenes
  state_check_exclusions: !input targets_excluded_from_state_check
  allow_active_effects: !input ignore_active_effects
  turn_off_state_excluded_lights: !input turn_off_state_excluded_lights
  brightness_restore_exclusions: !input targets_excluded_from_brightness_restore
  resolved_targets: >
    {#
      Converts Home Assistant target selectors (entity / device / area / label)
      into flat, unique lists of light entities.
    #}

    {%- macro resolve_targets(source, returns) -%}

      {# Direct entity targets #}
      {%- set entities = source.entity_id 
        if source.entity_id is list
        else ([source.entity_id] 
          if source.entity_id is defined 
          else [])
      -%}

      {# Hierarchical targets #}
      {%- set floors = (source.floor_id | map('floor_entities') | list | sum(start=[]))
        if source.floor_id is list 
        else (floor_entities(source.floor_id) 
          if source.floor_id is defined 
          else [])
      -%}

      {%- set areas = (source.area_id | map('area_entities') | list | sum(start=[]))
        if source.area_id is list 
        else (area_entities(source.area_id) 
          if source.area_id is defined 
          else [])
      -%}

      {%- set devices = (source.device_id | map('device_entities') | list | sum(start=[]))
        if source.device_id is list 
        else (device_entities(source.device_id) 
          if source.device_id is defined 
          else [])
      -%}

      {%- set labels = namespace(entities=[]) -%}

      {%- if source.label_id is defined -%}
        {# Normalize to list #}
        {%- set label_ids = source.label_id 
          if source.label_id is list
          else [source.label_id]
        -%}

        {%- for label in label_ids %}
          {# 1. Directly labeled entities #}
          {%- set labels.entities = labels.entities + (label_entities(label) or []) -%}

          {# 2. Devices with label → their entities #}
          {%- set labeled_devices = label_devices(label) or [] -%}
          {%- set labels.entities = labels.entities + (labeled_devices | map('device_entities') | list | sum(start=[])) -%}

          {# 3. Areas with label → their entities #}
          {%- set labeled_areas = label_areas(label) or [] -%}
          {%- set labels.entities = labels.entities + (labeled_areas | map('area_entities') | list | sum(start=[])) -%}
        {%- endfor -%}
      {%- endif -%}

      {# Merge, filter and de-duplicate light entities #}
      {%- do returns(
        (entities + floors + areas + devices + labels.entities)
          | select('match', '^light\.')
          | unique
          | list
      ) -%}

    {%- endmacro -%}

    {% set fn = resolve_targets | as_function %}
    {{
      {
        'dynamic': fn(dynamic_scene_targets),
        'state_excluded': fn(state_check_exclusions),
        'brightness_excluded': fn(brightness_restore_exclusions)
      }
    }}
    
conditions:
  - alias: Pass if triggered by state change or valid Hue light
    condition: or
    conditions:
      - alias: Triggered by Hue state change without being blacklisted
        condition: and
        conditions:
          - alias: Triggered by Hue state change
            condition: trigger
            id: state_change
            
          - alias: Not state check excluded
            condition: template
            value_template: "{{ trigger.entity_id not in resolved_targets.state_excluded }}"
            
      - alias: Triggered externally but resolved to Hue light
        condition: and
        conditions:
          - alias: Not triggered by primary state_change
            condition: not
            conditions:
              - condition: trigger
                id: state_change

          - alias: Trigger entity_id is valid
            condition: template
            value_template: "{{ trigger.entity_id is string }}"

          - alias: Entity belongs to light domain
            condition: template
            value_template: "{{ trigger.entity_id.split('.')[0] == 'light' }}"

          - alias: Entity belongs to Philips Hue integration
            condition: template
            value_template: >
              {% set ids = device_attr(trigger.entity_id, 'identifiers') or [] %}
              {{ ids | selectattr(0, 'eq', 'hue') | list | count > 0 }}
 
actions:
  - alias: "Wait for state trigger debounce"
    delay: !input state_trigger_delay
    
  - alias: "Resolve Hue room and overlapping zones from trigger"
    variables:
      area_context: >
        {#
          Resolves the Hue room context for the current trigger and
          determines all Hue zones that overlap with that room.

          Resolution rules:
          - If the trigger is a Hue room → use it directly
          - If the trigger is a Hue zone → resolve the parent room via a shared light
          - If the trigger is a single Hue light → resolve the containing room
          - If no room can be resolved, the automation will abort later
        #}

        {#
          Collect all Hue groups (rooms and zones).
          These are represented as light entities with the `is_hue_group` attribute.
        #}
        {% set hue_groups =
          states.light
          | selectattr('attributes.is_hue_group','eq',true)
          | rejectattr('state','in', ['unavailable', 'unknown'])
          | list
        %}

        {# Placeholder for the resolved Hue room entity #}
        {% set room_entity = none %}

        {# 
          Case 1: Trigger entity is already a Hue group (room or zone) 
        #}
        {% if is_state_attr(trigger.entity_id, 'is_hue_group', true) %}
          
          {#
            Sub-case: Trigger is a Hue room.
            The room context is already known.
          #}
          {% if is_state_attr(trigger.entity_id, 'hue_type', 'room') %}
            {% set room_entity = trigger.entity_id %}

          {#
            Sub-case: Trigger is a Hue zone.
            Resolve the corresponding room by:
            - Taking the first light from the zone
            - Finding the room that contains that light
          #}
          {% else %}
            {% set first_light = state_attr(trigger.entity_id,'entity_id') | first %}
            {% set room_entity =
              hue_groups
              | selectattr('attributes.hue_type','eq','room')
              | selectattr('attributes.entity_id','contains', first_light)
              | map(attribute='entity_id')
              | first
            %}
          {% endif %}
        
        {#
          Case 2: Trigger entity is a single Hue light.
          Resolve the room that contains this light.
        #}
        {% else %}
          {% set room_entity =
            hue_groups
            | selectattr('attributes.hue_type','eq','room')
            | selectattr('attributes.entity_id','contains', trigger.entity_id)
            | map(attribute='entity_id')
            | first
          %}
        {% endif %}

        {#
          Determine overlapping Hue zones.

          A zone is considered overlapping when:
          - A room has been resolved
          - At least one light belongs to both the room and the zone

          These zones may need brightness restoration or scene activation
          alongside the resolved room.
        #}
        {% set ns = namespace(zones=[]) %}
        {% if room_entity %}
          {% set room_lights = state_attr(room_entity,'entity_id') %}
          {% for zone in hue_groups | selectattr('attributes.hue_type','eq','zone') %}
            {% if state_attr(zone.entity_id,'entity_id') | select('in', room_lights) | list %}
              {% set ns.zones = ns.zones + [zone.entity_id] %}
            {% endif %}
          {% endfor %}
        {% endif %}

        {#
          Final resolved context:
          - room  → the primary Hue room affected by the trigger
          - zones → all overlapping Hue zones (deduplicated)
        #}
        {{ { 'room': room_entity, 'zones': ns.zones | unique | list } }}

  - alias: "Abort if no Hue room could be resolved"
    if:
      - alias: "Check if resolved room is missing"
        condition: template
        value_template: "{{ area_context.room is none }}"
    then:
      - alias: "Log missing Hue room resolution"
        action: system_log.write
        data:
          level: error
          message: >
            Hue Scene Refresher aborted: Unable to resolve a Hue room for trigger entity '{{ trigger.entity_id }}'.
      
      - alias: "Stop automation due to missing room context"
        stop: "No Hue room resolved"
        error: true
        
  - alias: "Capture room and zone state snapshot"
    variables:
      area_snapshot: >
        {#
          Captures a snapshot of the current Hue area state at trigger time.

          For the resolved room and any overlapping zones, this snapshot determines:
          - Whether the area is considered fully ON (state evaluation)
          - Whether active effects are blocking refresh logic
          - The last active Hue scene per group
          - Brightness levels used for restoration
          - Per-light brightness and force-off candidates (room only)

          This snapshot is later used to decide:
          - Whether scenes should be re-activated
          - Whether brightness should be restored
          - Whether excluded lights must be turned off again
        #}

        {% set snapshot = namespace(room = none, zones = []) %}

        {# Build list of all groups to evaluate (room + overlapping zones) #}
        {% set groups =
          area_context.zones +
          ([area_context.room] if area_context.room else [])
        %}

        {% for group in groups %}
          {# Expand all light entities belonging to the group #}
          {% set members = expand(state_attr(group,'entity_id')) | list %}

          {#
            Lights used for state evaluation:
            - Excludes lights explicitly removed from state checks
            - Ignores lights with unknown state
          #}
          {% set lights = members
            | rejectattr('entity_id','in', resolved_targets.state_excluded)
            | selectattr('state','ne','unknown')
            | list
          %}

          {# Lights that are currently ON #}
          {% set active = lights | selectattr('state','eq','on') | list %}

          {#
            Lights capable of running effects (e.g. color loop, animations).
            Used to determine whether active effects should block refresh logic.
          #}
          {% set effect_capable =
            active | selectattr('attributes.effect','ne', undefined) | list
          %}

          {#
            Effects are considered clear when:
            - Active effects are explicitly allowed
            - OR all effect-capable lights are not currently running an effect
          #}
          {% set effects_clear =
            allow_active_effects or
            (effect_capable
              | selectattr('attributes.effect','in',[ none, off, 'none', 'off'])
              | list | count == effect_capable | count)
          %}

          {#
            A group is considered fully ON when:
            - At least one evaluated light exists
            - All evaluated lights are ON
            - No blocking effects are active
          #}
          {% set is_area_on =
            lights | count > 0 and
            active | count == lights | count and
            effects_clear
          %}

          {#
            Determine the last active Hue scene for this group by:
            - Collecting all scene entities bound to the group device
            - Sorting by state timestamp (newest first)
            - Selecting the most recent non-unknown scene
          #}
          {% set last_scene =
            expand(device_entities(device_id(group)))
            | selectattr('domain', 'eq', 'scene')
            | selectattr('state','ne','unknown')
            | sort(attribute='state', reverse=true)
            | map(attribute='entity_id')
            | list
            | first
          %}

          {#
            Base snapshot data shared by rooms and zones
          #}
          {% set group_data = {
            'entity_id': group,
            'brightness': state_attr(group,'brightness'),
            'scene_speed': (state_attr(last_scene, 'speed') | default(50)) * 100,
            'is_area_on': is_area_on,
            'last_scene': last_scene
          } %}

          {% if group == area_context.room %}
            {#
              Room-specific snapshot data:

              - Capture per-light brightness for later restoration
              - Track excluded lights that were OFF at snapshot time,
                so they can be forcefully turned off again after scene activation
            #}

            {% set light_snapshot = namespace(items=[]) %}
            {% for light in active %}
              {% set light_snapshot.items = light_snapshot.items + [{
                'entity_id': light.entity_id,
                'brightness': light.attributes.brightness
              }] %}
            {% endfor %}
            
            {#
              Lights excluded from state evaluation that are currently OFF.
              These may be turned ON by scene activation and must be corrected.
            #}
            {% set state_excluded = members
              | selectattr('entity_id', 'in', resolved_targets.state_excluded)
              | selectattr('state', 'eq', 'off')
              | map(attribute='entity_id')
              | list
            %}

            {% set group_data = group_data | combine({
              'active_lights': light_snapshot.items,
              'state_excluded_lights': state_excluded
            }) %}

            {% set snapshot.room = group_data %}

          {% elif is_area_on %}
            {#
              Zones are only included when fully ON.
              Partially ON zones are intentionally ignored to avoid
              unintended scene or brightness changes.
            #}
            {% set snapshot.zones = snapshot.zones + [group_data] %}
          {% endif %}
        {% endfor %}

        {{ { 'room': snapshot.room, 'zones': snapshot.zones } }}

  - alias: "Ensure at least one active room light exists"
    condition: template
    value_template: "{{ area_snapshot.room.active_lights | count > 0 }}"

  - alias: "Branch based on room fully-on state"
    if:
      - alias: "Check if entire room is currently ON"
        condition: template
        value_template: "{{ area_snapshot.room.is_area_on }}"
    then:
      - alias: "Ensure a scene was found"
        condition: template
        value_template: "{{ area_snapshot.room.last_scene is not none }}"

      - alias: "Build Hue scene payload for room activation"
        variables:
          scene_data: >
            {#
              Scene payload for Hue room activation.
              Dynamic mode and brightness restoration are applied conditionally.
            #}

            {% set data = {
              'dynamic': area_snapshot.room.entity_id in resolved_targets.dynamic,
              'speed': dynamic_scene_speed if dynamic_scene_speed > -1 else area_snapshot.room.scene_speed,
              'transition': scene_transition_time
            } %}

            {% if area_snapshot.room.entity_id not in resolved_targets.brightness_excluded %}
              {% set data = data | combine({
                'brightness': area_snapshot.room.brightness
              }) %}
            {% endif %}

            {{ data }}
            
      - alias: "Activate last active scene for room"
        action: hue.activate_scene
        continue_on_error: true
        data: "{{ scene_data }}"
        target:
          entity_id: "{{ area_snapshot.room.last_scene }}"
      
      - alias: "Optionally turn off state-excluded lights (room)"
        if:
          - alias: "Check if excluded lights should be forced off"
            condition: template
            value_template: "{{ turn_off_state_excluded_lights }}"
        then:
          - alias: "Turn off excluded lights in room"
            action: light.turn_off
            data:
              transition: "{{ brightness_transition_time }}" 
            target:
              entity_id: "{{ area_snapshot.room.state_excluded_lights }}"

      - alias: "Wait for room brightness change to begin"
        continue_on_timeout: true
        timeout: "{{ scene_transition_time }}"
        wait_template: >
          {% set light_snapshot = area_snapshot.room %}
          {{ not is_state_attr(light_snapshot.entity_id, 'brightness', light_snapshot.brightness) }}

      - alias: "Restore brightness for overlapping zones"
        repeat:
          for_each: "{{ area_snapshot.zones | rejectattr('entity_id','in', resolved_targets.brightness_excluded) | list }}"
          sequence:
            - alias: "Restore zone brightness if changed"
              condition: template
              value_template: "{{ state_attr(repeat.item.entity_id,'brightness') != repeat.item.brightness }}"

            - alias: "Apply brightness to zone"
              action: light.turn_on
              continue_on_error: true
              data:
                brightness: "{{ repeat.item.brightness }}"
                transition: "{{ brightness_transition_time }}"
              target:
                entity_id: "{{ repeat.item.entity_id }}"

      - alias: "Wait for zone brightness change to begin"
        continue_on_timeout: true
        timeout: "{{ brightness_transition_time }}"
        wait_template: >
          {% set light_snapshot = area_snapshot.zones | last or area_snapshot.room %}
          {{ not is_state_attr(light_snapshot.entity_id, 'brightness', light_snapshot.brightness) }}

    else:
      - alias: "Activate scenes for fully-on zones only"
        repeat:
          for_each: "{{ area_snapshot.zones | rejectattr('last_scene','eq', none) | list }}"
          sequence:
            - alias: "Build Hue scene payload for zone activation"
              variables:
                scene_data: >
                  {#
                    Scene payload for Hue zone activation.
                    Brightness restoration is optional.
                  #}

                  {% set data = {
                    'dynamic': repeat.item.entity_id in resolved_targets.dynamic,
                    'speed': dynamic_scene_speed if dynamic_scene_speed > -1 else repeat.item.scene_speed,
                    'transition': scene_transition_time
                  } %}

                  {% if repeat.item.entity_id not in resolved_targets.brightness_excluded %}
                    {% set data = data | combine({
                      'brightness': repeat.item.brightness
                    }) %}
                  {% endif %}

                  {{ data }}
            
            - alias: "Activate last active scene for zone"
              action: hue.activate_scene
              continue_on_error: true
              data: "{{ scene_data }}"
              target:
                entity_id: "{{ repeat.item.last_scene }}"
      
      - alias: "Optionally turn off state-excluded lights (room)"
        if:
          - alias: "Check if excluded lights should be forced off"
            condition: template
            value_template: "{{ turn_off_state_excluded_lights }}" 
        then:
          - alias: "Turn off excluded lights in room"
            action: light.turn_off
            data:
              transition: "{{ brightness_transition_time }}"
            target:
              entity_id: "{{ area_snapshot.room.state_excluded_lights }}"
                
      - alias: "Wait for zone brightness change to begin"
        continue_on_timeout: true
        timeout: "{{ scene_transition_time }}"
        wait_template: >
          {% set light_snapshot = area_snapshot.zones | last or area_snapshot.room %}
          {{ not is_state_attr(light_snapshot.entity_id, 'brightness', light_snapshot.brightness) }}
    
  - alias: "Restore per-light brightness in room"
    repeat:
      for_each: "{{ area_snapshot.room.active_lights | rejectattr('entity_id','in', resolved_targets.brightness_excluded) | list }}"
      sequence:
        - alias: "Restore light brightness if changed"
          condition: template
          value_template: "{{ state_attr(repeat.item.entity_id,'brightness') != repeat.item.brightness }}"

        - alias: "Apply brightness to individual light"
          action: light.turn_on
          continue_on_error: true
          data:
            brightness: "{{ repeat.item.brightness }}"
            transition: "{{ brightness_transition_time }}"
          target:
            entity_id: "{{ repeat.item.entity_id }}"